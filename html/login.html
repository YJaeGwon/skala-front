<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" href="../css/style.css">
    <script>
      document.documentElement.dataset.theme = localStorage.getItem("theme") || "light";
      document.documentElement.style.fontSize =
        (Number(localStorage.getItem("fontScale")) || 1) * 100 + "%";
    </script>
  </head>
  <body>
    <div class="container">
    <p><a href="index.html" class="home-btn">🏠 홈으로</a></p>
    <h1>🔐 로그인</h1>
    <p>회원가입 때 입력한 아이디와 비밀번호로 로그인하세요.</p>

    <form id="login-form">
      <fieldset>
        <legend>로그인 정보</legend>
        <p>
          <label for="loginId">아이디: </label>
          <input type="text" id="loginId" autocomplete="username" required>
        </p>
        <p>
          <label for="loginPw">비밀번호: </label>
          <input type="password" id="loginPw" autocomplete="current-password" required>
        </p>
      </fieldset>

      <p id="login-error"></p>

      <p>
        <input type="submit" class="btn-submit" value="로그인">
      </p>
    </form>

    <p>계정이 없으신가요? <a href="signUp.html">📝 회원가입 하러 가기</a></p>
    </div>

    <script src="../script/auth.js"></script>
  </body>
</html>
