<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행지 소개</title>
    <link rel="stylesheet" href="../css/style.css">
    <script>
      document.documentElement.dataset.theme = localStorage.getItem("theme") || "light";
      document.documentElement.style.fontSize =
        (Number(localStorage.getItem("fontScale")) || 1) * 100 + "%";
    </script>
  </head>
  <body>
    <div class="container">
    <p><a href="index.html" class="home-btn">🏠 홈으로</a></p>
    <h1>✈️ 나의 여행지 소개</h1>

    <h2>🎵 배경 음악</h2>
    <audio controls>
      <source src="../media/music.mp3" type="audio/mpeg">
      브라우저가 audio 태그를 지원하지 않습니다.
    </audio>

    <h2>📸 여행 사진</h2>
    <div class="trip-slider">
      <button class="slider-btn slider-prev" onclick="moveSlide(-1)">‹</button>
      <div class="slider-viewport">
        <div class="slider-track" id="tripSliderTrack">
          <p class="trip-card">
            <img src="../media/도쿄.jpg" alt="도쿄"><br>
            🗼 도쿄 (2025)
          </p>
          <p class="trip-card">
            <img src="../media/오사카.jpg" alt="오사카"><br>
            🏙️ 오사카 (2023)
          </p>
          <p class="trip-card">
            <img src="../media/오사카성.jpg" alt="오사카성"><br>
            🏯 오사카성 (2023)
          </p>
          <p class="trip-card">
            <img src="../media/후쿠오카 오미쿠지.jpg" alt="후쿠오카 오미쿠지"><br>
            🎋 후쿠오카 오미쿠지 (2024)
          </p>
        </div>
      </div>
      <button class="slider-btn slider-next" onclick="moveSlide(1)">›</button>
    </div>

    <h2>🍽️ 여행 중 먹은 음식</h2>
    <div class="food-gallery">
      <p class="trip-card">
        <img src="../media/회.jpg" alt="회" onclick="openLightbox(this.src, this.alt)"><br>
        🐟 회
      </p>
      <p class="trip-card">
        <img src="../media/규카츠.jpg" alt="규카츠" onclick="openLightbox(this.src, this.alt)"><br>
        🍱 규카츠
      </p>
      <p class="trip-card">
        <img src="../media/돈카츠.jpg" alt="돈카츠" onclick="openLightbox(this.src, this.alt)"><br>
        🍖 돈카츠
      </p>
      <p class="trip-card">
        <img src="../media/우동.jpg" alt="우동" onclick="openLightbox(this.src, this.alt)"><br>
        🍜 우동
      </p>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
      <img id="lightbox-img" src="" alt="">
    </div>

    <h2>🎬 여행 영상</h2>
    <p>
      <video controls width="400">
        <source src="../media/airplane.mp4" type="video/mp4">
        브라우저가 video 태그를 지원하지 않습니다.
      </video>
      <br>설레는 '여행의 시작'
    </p>
    </div>

    <script src="../script/tripSlider.js"></script>
    <script src="../script/lightbox.js"></script>
  </body>
</html>
