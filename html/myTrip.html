<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행지 소개</title>
    <link rel="stylesheet" href="../css/style.css">
  </head>
  <body>
    <div class="container">
    <h1>✈️ 나의 여행지 소개</h1>

    <h2>🎵 배경 음악</h2>
    <audio controls>
      <source src="../media/music.mp3" type="audio/mpeg">
      브라우저가 audio 태그를 지원하지 않습니다.
    </audio>

    <h2>📸 여행 사진</h2>
    <div class="trip-grid-container">
      <p class="trip-card">
        <img src="../media/리장.jpg" alt="리장 트레킹" width="400"><br>
        🏞️ 리장 트레킹 (<!-- 연도 -->)
      </p>
      <p class="trip-card">
        <img src="../media/세부.jpg" alt="세부 리조트" width="400"><br>
        🏝️ 세부 리조트 (<!-- 연도 -->)
      </p>
      <p class="trip-card">
        <img src="../media/홋카이도.jpg" alt="홋카이도 온천" width="400"><br>
        ♨️ 홋카이도 온천 (<!-- 연도 -->)
      </p>
    </div>

    <h2>🎬 여행 영상</h2>
    <p>
      <video controls width="400">
        <source src="../media/video.mp4" type="video/mp4">
        브라우저가 video 태그를 지원하지 않습니다.
      </video>
      <br><!-- 영상 설명 -->
    </p>
    </div>
  </body>
</html>
