<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="../css/style.css">
  </head>
  <body>
    <div class="container">
    <p><a href="index.html" class="home-btn">🏠 홈으로</a></p>
    <h1>📝 회원가입</h1>

    <form action="signUpResult.html" method="get">
      <fieldset>
        <legend>👤 계정 정보</legend>
        <p>
          <label for="userId">아이디: </label>
          <input type="text" id="userId" name="userId" placeholder="4~15자 영문/숫자" required>
        </p>
        <p>
          <label for="userPw">비밀번호: </label>
          <input type="password" id="userPw" name="userPw" placeholder="8자 이상 입력" required>
        </p>
        <p>
          <label for="userEmail">이메일: </label>
          <input type="text" id="userEmail" name="userEmail" placeholder="example">
          @
          <select name="emailDomain">
            <option value="direct">직접 입력</option>
            <option value="naver.com">naver.com</option>
            <option value="gmail.com">gmail.com</option>
            <option value="daum.net">daum.net</option>
          </select>
        </p>
      </fieldset>

      <fieldset>
        <legend>🙋 개인 프로필 정보</legend>
        <p>
          <label for="userName">이름: </label>
          <input type="text" id="userName" name="userName" required>
        </p>
        <p>
          <label for="userBirth">생년월일: </label>
          <input type="date" id="userBirth" name="userBirth">
        </p>
        <p>
          성별:
          <label><input type="radio" name="gender" value="male" checked> 남성</label>
          <label><input type="radio" name="gender" value="female"> 여성</label>
          <label><input type="radio" name="gender" value="none"> 선택 안 함</label>
        </p>
        <p>
          관심 분야 (중복 선택 가능): <br>
          <label><input type="checkbox" name="interest" value="frontend"> 💻 프론트엔드</label><br>
          <label><input type="checkbox" name="interest" value="backend"> 🗄️ 백엔드</label><br>
          <label><input type="checkbox" name="interest" value="design"> 🎨 UI/UX 디자인</label><br>
          <label><input type="checkbox" name="interest" value="etc"> 🌱 기타</label>
        </p>
        <p>
          <label for="joinPath">가입 경로: </label>
          <select id="joinPath" name="joinPath">
            <option value="search">인터넷 검색</option>
            <option value="friend">지인 추천</option>
            <option value="sns">SNS 광고</option>
            <option value="etc">기타</option>
          </select>
        </p>
        <p>
          <label for="intro">자기소개: </label><br>
          <textarea id="intro" name="intro" rows="5" cols="40" placeholder="간단한 자기소개를 입력하세요"></textarea>
        </p>
      </fieldset>

      <p>
        <input type="submit" class="btn-submit" value="🚀 가입하기">
        <input type="reset" class="btn-reset" value="🔄 다시 작성">
      </p>
    </form>
    </div>
  </body>
</html>
